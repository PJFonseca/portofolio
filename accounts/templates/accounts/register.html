
{% block content %}
<div class="card" style="max-width: 400px; margin: 2rem auto; padding: 2rem;">
    <h2>Registo</h2>
    <form method="POST" style="display: grid; gap: 1rem;">
        {% csrf_token %}
        {% for field in form %}
        <div>
            <label class="form-label fw-medium">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <p style="color: red; font-size: 13px;">{{ field.errors }}</p>
            {% endif %}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary w-100">Registar</button>
    </form>
    <p class="mt-3 text-muted" style="font-size: 13px;">
        Já tens conta? <a href="{% url 'login' %}">Faz login</a>
    </p>
</div>
{% endblock %}
