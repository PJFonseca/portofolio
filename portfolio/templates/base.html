<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedro Fonseca - Portfolio</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'styles.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg border-bottom">
  <div class="container-fluid px-4">
    <a class="navbar-brand" href="{% url 'home' %}">
      <span class="fw-medium">Portfolio</span><br>
      <small class="text-secondary fw-normal" style="font-size: 0.75rem;">Pedro Fonseca</small>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item"><a class="nav-link" href="{% url 'home' %}"><i class="fa-solid fa-house me-1"></i>Home</a></li>
        <li class="nav-item"><a class="nav-link" href=""><i class="fa-solid fa-project-diagram me-1"></i>Projects</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'disciplines' %}"><i class="fa-solid fa-book me-1"></i>Disciplines</a></li>
        <li class="nav-item"><a class="nav-link" href=""><i class="fa-solid fa-laptop-code me-1"></i>Technologies</a></li>
        <li class="nav-item"><a class="nav-link" href=""><i class="fa-solid fa-tasks me-1"></i>Competencies</a></li>
        <li class="nav-item"><a class="nav-link" href=""><i class="fa-solid fa-chalkboard-teacher me-1"></i>Teachers</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'changelog' %}"><i class="fa-solid fa-history me-1"></i>Changelog</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="container py-4">
  {% block content %}{% endblock %}
</main>

<footer class="border-top mt-5 py-3">
  <div class="container">
    <p class="text-secondary small mb-0">&copy; 2026 Pedro Fonseca</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
