{% extends "../base.html" %}
    
{% block content %}
<h2>Disciplines</h2>

<section>
    {% for discipline in disciplines %}

        <header>
            <h3>{{ discipline.code }}</h3>
            <p>{{ discipline.name }}</p>
        </header>
    </article>
    {% endfor %}
</section>
{% endblock %}
