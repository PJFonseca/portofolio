{% extends "../base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="mb-0">Delete Project</h2>
  <a href="{% url 'projects' %}" class="btn btn-outline-secondary btn-sm">
    <i class="fa-solid fa-arrow-left me-1"></i> Back
  </a>
</div>

<div class="card">
  <div class="card-body">

    <div class="d-flex align-items-center gap-3 mb-4">
      <div style="width: 48px; height: 48px; border-radius: 10px; background-color: {{ project.background_color }}; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
        <i class="{{ project.icon|default:'fa-solid fa-book' }}" style="color: {{ project.text_color }}; font-size: 1.2rem;"></i>
      </div>
      <div>
        <h5 class="mb-1">{{ project.name }}</h5>
        <small class="text-secondary">{{ project.code }} · {{ project.ects }} ECTS</small>
      </div>
    </div>

    <div class="alert alert-danger">
      <i class="fa-solid fa-triangle-exclamation me-2"></i>
      Are you sure you want to delete <strong>{{ project.name }}</strong>? This action cannot be undone.
    </div>

    <form method="POST" action="{% url 'project_delete' project.id %}">
      {% csrf_token %}
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-danger">
          <i class="fa-solid fa-trash me-1"></i> Yes, delete
        </button>
        <a href="{% url 'projects' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>

  </div>
</div>
{% endblock %}
